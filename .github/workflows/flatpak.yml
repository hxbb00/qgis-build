    name: Download QGIS By Flatpak

    on:
      workflow_dispatch:

    jobs:
      release:
        runs-on: ubuntu-latest
        steps:

          - name: install flatpak
            run: |
              echo "install flatpak:"
              sudo apt update
              sudo apt install flatpak
              sudo flatpak remote-add --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
              sudo flatpak --version

          - name: install flatpak QGIS
            run: |
              echo "install QGIS:"
              sudo flatpak install -y flathub app/org.qgis.qgis/x86_64/lts
              sudo flatpak info org.qgis.qgis
              sudo flatpak info org.qgis.qgis --show-runtime
              sudo ls -l /var/lib/flatpak/app/org.qgis.qgis/ 2>/dev/null || echo "not exists"
              sudo ls -l /var/lib/flatpak/runtime/ 2>/dev/null || echo "not exists"
              sudo ls -l /var/lib/flatpak/exports/share/applications/ 2>/dev/null || echo "not exists"              
              echo "ls home:"
              sudo ls -l ~/.local/share/flatpak/app/org.qgis.qgis/ 2>/dev/null || echo "not exists"
              sudo ls -l ~/.var/app/org.qgis.qgis/ 2>/dev/null || echo "not exists"
              sudo ls -l ~/.local/share/flatpak/exports/share/applications/ 2>/dev/null || echo "not exists"

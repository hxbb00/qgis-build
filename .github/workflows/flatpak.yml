name: Download QGIS By Flatpak

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Install flatpak & zip
        run: |
          sudo apt update
          sudo apt install -y flatpak zip git
          sudo flatpak remote-add --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo

      - name: Install QGIS Flatpak
        run: |
          sudo flatpak install -y flathub app/org.qgis.qgis/x86_64/stable

      - name: Clone flatpak2appdir & grant execute
        run: |
          git clone https://github.com/sudo-give-me-coffee/flatpak2appdir.git bin
          cd bin
          chmod +x flatpak2appdir strace-file appimagetool

      - name: Export QGIS to AppDir
        run: |
          ./bin/flatpak2appdir org.qgis.qgis
          ls -la org.qgis.qgis.AppDir/

      - name: Set release date
        run: |
          echo "RELEASE_DATE=$(date +%Y%m%d-%H%M%S)" >> $GITHUB_ENV

      - name: Pack AppDir
        run: |
          zip -r -y QGIS-AppDir-${{ env.RELEASE_DATE }}.zip org.qgis.qgis.AppDir

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: flatpak-qgis-appdir-${{ env.RELEASE_DATE }}
          name: flatpak-qgis-appdir-${{ env.RELEASE_DATE }}
          body: |
            QGIS Flatpak → AppDir 离线包
            工具：https://github.com/sudo-give-me-coffee/flatpak2appdir
          files: |
            QGIS-AppDir-${{ env.RELEASE_DATE }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
